<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>ASCII Art Generator</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:          #0a0e0a;
      --bg-elevated: #0d120d;
      --fg:          #c0e0c0;
      --accent:      #4ade80;
      --dim:         #5a7a5a;
      --border:      #1a2a1a;
      --error:       #f87171;
    }

    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      padding: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--fg);
      font-family: 'JetBrains Mono', 'Courier New', monospace;
      font-size: 14px;
      font-weight: 400;
      line-height: 1.4;
    }
    body {
      border: 1px solid transparent;
      transition: border-color 0.1s;
    }
    body.dragging { border-color: var(--accent); }

    button {
      font-family: inherit;
      font-size: inherit;
      font-weight: inherit;
      color: inherit;
    }
    button:focus-visible,
    input:focus-visible {
      outline: 1px solid var(--accent);
      outline-offset: 2px;
    }

    /* ---- Top bar ---- */
    #topbar {
      display: flex;
      align-items: stretch;
      gap: 24px;
      padding: 16px 20px;
      border-bottom: 1px solid var(--border);
      background: var(--bg);
      position: sticky;
      top: 0;
      z-index: 10;
    }
    .group {
      display: flex;
      align-items: flex-end;
      gap: 12px;
    }
    .divider {
      width: 1px;
      background: var(--border);
      align-self: stretch;
    }

    /* ---- Settings (label + control stack) ---- */
    .setting {
      display: flex;
      flex-direction: column;
      gap: 8px;
      align-items: flex-start;
      min-height: 44px;
      justify-content: flex-end;
    }
    .setting-label {
      font-size: 11px;
      color: var(--dim);
      letter-spacing: 0.5px;
      white-space: nowrap;
    }
    .setting-control {
      display: flex;
      align-items: center;
      gap: 8px;
      color: var(--fg);
    }
    .readout {
      color: var(--dim);
      font-size: 13px;
      min-width: 28px;
      text-align: right;
    }

    /* ---- Mode buttons ---- */
    .mode-btn {
      background: transparent;
      color: var(--dim);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 6px 14px;
      cursor: pointer;
      font-weight: 400;
      transition: color 0.1s, border-color 0.1s, background 0.1s;
    }
    .mode-btn:hover:not(.active) {
      color: var(--fg);
      border-color: var(--fg);
    }
    .mode-btn.active {
      background: var(--accent);
      color: var(--bg);
      border-color: var(--accent);
      font-weight: 500;
    }

    /* ---- Text toggle ---- */
    .toggle {
      background: transparent;
      border: none;
      cursor: pointer;
      padding: 0;
      min-width: 32px;
      text-align: left;
      font-weight: 500;
      font-size: 14px;
    }
    .toggle[data-state="on"]  { color: var(--accent); }
    .toggle[data-state="off"] { color: var(--dim); }

    /* ---- Custom dropdown ---- */
    .dropdown { position: relative; }
    .dropdown-trigger {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--fg);
      padding: 5px 10px;
      border-radius: 4px;
      cursor: pointer;
      min-width: 104px;
      text-align: left;
      font-weight: 500;
    }
    .dropdown-trigger::after {
      content: ' ▾';
      color: var(--dim);
      font-weight: 400;
    }
    .dropdown-trigger:hover { border-color: var(--fg); }
    .dropdown-menu {
      position: absolute;
      top: calc(100% + 4px);
      left: 0;
      background: var(--bg-elevated);
      border: 1px solid var(--border);
      border-radius: 4px;
      list-style: none;
      padding: 4px 0;
      margin: 0;
      min-width: 104px;
      z-index: 20;
    }
    .dropdown-menu[hidden] { display: none; }
    .dropdown-menu li {
      padding: 6px 12px;
      cursor: pointer;
      color: var(--fg);
    }
    .dropdown-menu li:hover { background: var(--border); }
    .dropdown-menu li.selected { color: var(--accent); }

    /* ---- Sliders ---- */
    .slider {
      -webkit-appearance: none;
      appearance: none;
      height: 2px;
      background: var(--border);
      cursor: pointer;
      outline: none;
      width: 120px;
      border-radius: 2px;
      padding: 0;
      margin: 0;
    }
    .slider::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 12px;
      height: 12px;
      background: var(--accent);
      border-radius: 50%;
      cursor: pointer;
      border: none;
    }
    .slider::-moz-range-thumb {
      width: 12px;
      height: 12px;
      background: var(--accent);
      border-radius: 50%;
      cursor: pointer;
      border: none;
    }

    /* ---- Action buttons ---- */
    .action-btn {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--fg);
      padding: 5px 12px;
      border-radius: 4px;
      cursor: pointer;
      transition: color 0.1s, border-color 0.1s;
    }
    .action-btn:hover {
      border-color: var(--fg);
    }
    .action-btn:disabled {
      opacity: 0.35;
      cursor: not-allowed;
      pointer-events: none;
    }
    .action-btn.copied {
      color: var(--accent);
      border-color: var(--accent);
    }
    .action-btn.failed {
      color: var(--error);
      border-color: var(--error);
    }

    /* ---- Live indicator ---- */
    .live-indicator {
      margin-left: auto;
      display: none;
      align-items: center;
      gap: 6px;
      color: var(--dim);
      align-self: center;
    }
    .live-indicator.show { display: flex; }
    .live-dot {
      color: var(--error);
      animation: pulse 1.5s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50%      { opacity: 0.3; }
    }

    /* ---- Status line ---- */
    #status {
      background: var(--bg-elevated);
      color: var(--dim);
      padding: 8px 20px;
      font-size: 12px;
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 73px;
      z-index: 9;
    }
    #status[hidden] { display: none; }
    .status-key { color: var(--dim); }
    .status-val { color: var(--fg); margin-left: 4px; margin-right: 16px; }
    .status-val:last-child { margin-right: 0; }
    .status-note {
      color: var(--dim);
      margin-left: 4px;
    }

    /* ---- Main area ---- */
    main {
      position: relative;
      padding: 0;
    }
    #empty {
      min-height: calc(100vh - 200px);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: var(--dim);
      gap: 10px;
      padding: 40px 20px;
    }
    .empty-line { font-size: 14px; }
    .empty-or   { color: var(--border); font-size: 12px; }
    .empty-action {
      color: var(--fg);
      cursor: pointer;
    }
    .empty-action:hover { color: var(--accent); }
    .empty-error { color: var(--error); }
    .kbd { color: var(--accent); }
    .cursor {
      display: inline-block;
      margin-top: 16px;
      color: var(--accent);
      animation: blink 1.1s steps(2) infinite;
      font-weight: 500;
    }
    @keyframes blink {
      0%, 50% { opacity: 1; }
      51%, 100% { opacity: 0; }
    }

    #output {
      margin: 0;
      padding: 20px;
      font-size: 8px;
      line-height: 1;
      letter-spacing: 0;
      white-space: pre;
      font-family: 'JetBrains Mono', 'Courier New', monospace;
      overflow-x: auto;
    }
    #output:empty { display: none; }

    /* ---- Video controls ---- */
    #video-controls {
      display: none;
      align-items: center;
      gap: 16px;
      padding: 12px 20px;
      border-top: 1px solid var(--border);
      background: var(--bg-elevated);
      position: sticky;
      bottom: 0;
    }
    #video-controls.show { display: flex; }
    #time { color: var(--dim); font-size: 12px; }

    /* ---- Error toast ---- */
    #error {
      position: fixed;
      bottom: 60px;
      left: 50%;
      transform: translateX(-50%);
      padding: 8px 16px;
      background: var(--bg-elevated);
      color: var(--error);
      border: 1px solid var(--error);
      border-radius: 4px;
      font-size: 12px;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s;
      z-index: 100;
    }
    #error.show { opacity: 1; }

    #canvas, #file-input, #video-file-input, #video-source { display: none; }
  </style>
</head>
<body>
  <header id="topbar">
    <!-- mode -->
    <div class="group" id="mode-group">
      <button class="mode-btn active" data-mode="image">image</button>
      <button class="mode-btn" data-mode="webcam">webcam</button>
      <button class="mode-btn" data-mode="video">video</button>
    </div>

    <div class="divider"></div>

    <!-- settings -->
    <div class="group">
      <div class="setting">
        <span class="setting-label">width</span>
        <div class="setting-control">
          <input type="range" id="width" min="40" max="300" value="120" class="slider" />
          <span class="readout" id="width-val">120</span>
        </div>
      </div>

      <div class="setting" id="ramp-setting">
        <span class="setting-label" id="ramp-label">ramp</span>
        <div class="dropdown" id="ramp-dropdown">
          <button class="dropdown-trigger" id="ramp-trigger"
                  aria-haspopup="listbox" aria-expanded="false">standard</button>
          <ul class="dropdown-menu" id="ramp-menu" role="listbox" hidden>
            <li data-value="standard" role="option">standard</li>
            <li data-value="simple"   role="option">simple</li>
            <li data-value="blocks"   role="option">blocks</li>
            <li data-value="binary"   role="option">binary</li>
          </ul>
        </div>
      </div>

      <div class="setting">
        <span class="setting-label">color</span>
        <button class="toggle" id="color-toggle"
                data-state="on" aria-pressed="true">on</button>
      </div>

      <div class="setting" id="invert-setting">
        <span class="setting-label" id="invert-label">invert</span>
        <button class="toggle" id="invert-toggle"
                data-state="off" aria-pressed="false">off</button>
      </div>

      <div class="setting">
        <span class="setting-label">edges</span>
        <button class="toggle" id="edges-toggle"
                data-state="off" aria-pressed="false">off</button>
      </div>
    </div>

    <div class="divider"></div>

    <!-- actions -->
    <div class="group">
      <div class="setting">
        <span class="setting-label">&nbsp;</span>
        <button class="action-btn" id="copy" disabled>[ copy ]</button>
      </div>
      <div class="setting">
        <span class="setting-label">&nbsp;</span>
        <button class="action-btn" id="save">[ save ]</button>
      </div>
      <div class="setting">
        <span class="setting-label">&nbsp;</span>
        <button class="action-btn" id="share">[ share ]</button>
      </div>
    </div>

    <div class="live-indicator" id="live-indicator">
      <span class="live-dot">●</span> live
    </div>
  </header>

  <div id="status" hidden></div>

  <main>
    <div id="empty"></div>
    <pre id="output"></pre>
  </main>

  <footer id="video-controls">
    <button class="action-btn" id="playpause" title="play/pause">❚❚</button>
    <span id="time">0:00 / 0:00</span>
  </footer>

  <canvas id="canvas"></canvas>
  <video id="video-source" playsinline muted></video>
  <input type="file" id="file-input" accept="image/*" />
  <input type="file" id="video-file-input" accept="video/*" />
  <div id="error"></div>

  <script>
    // ---- Constants ----

    const RAMPS = {
      standard: '$@B%8&WM#*oahkbdpqwmZO0QLCJUYXzcvunxrjft/\\|()1{}[]?-_+~<>i!lI;:,"^`\'. ',
      simple:   '@%#*+=-:. ',
      blocks:   '█▓▒░ ',
      binary:   '# ',
    };
    const RAMP_KEYS = Object.keys(RAMPS);
    const LIVE_WIDTH_CAP = 150;
    const FRAME_INTERVAL_MS = 33;
    const EDGE_THRESHOLD = 175;

    // ---- State ----

    const state = {
      mode: 'image',
      source: null,
      width: 120,
      color: true,
      ramp: 'standard',
      invert: false,
      edges: false,
      lastRenderMs: null,
    };

    let lastImage = null;
    let webcamStream = null;
    let videoObjectUrl = null;

    // ---- Element refs ----

    const els = {
      topbar: document.getElementById('topbar'),
      output: document.getElementById('output'),
      empty: document.getElementById('empty'),
      canvas: document.getElementById('canvas'),
      videoSource: document.getElementById('video-source'),

      modeGroup: document.getElementById('mode-group'),

      width: document.getElementById('width'),
      widthVal: document.getElementById('width-val'),

      rampTrigger: document.getElementById('ramp-trigger'),
      rampMenu: document.getElementById('ramp-menu'),

      colorToggle: document.getElementById('color-toggle'),
      invertToggle: document.getElementById('invert-toggle'),
      edgesToggle: document.getElementById('edges-toggle'),

      copy: document.getElementById('copy'),
      save: document.getElementById('save'),
      share: document.getElementById('share'),

      liveIndicator: document.getElementById('live-indicator'),
      status: document.getElementById('status'),

      videoControls: document.getElementById('video-controls'),
      playpause: document.getElementById('playpause'),
      time: document.getElementById('time'),

      fileInput: document.getElementById('file-input'),
      videoFileInput: document.getElementById('video-file-input'),
      error: document.getElementById('error'),
    };

    // ==== Rendering pipeline (unchanged from previous hours) ====

    function escapeHtmlChar(c) {
      switch (c) {
        case '<': return '&lt;';
        case '>': return '&gt;';
        case '&': return '&amp;';
        case '"': return '&quot;';
        case "'": return '&#39;';
        default:  return c;
      }
    }

    function sourceDims(src) {
      if (!src) return null;
      const w = src.videoWidth || src.naturalWidth || 0;
      const h = src.videoHeight || src.naturalHeight || 0;
      if (!w || !h) return null;
      return { w, h };
    }

    function effectiveWidth() {
      return state.mode === 'image'
        ? state.width
        : Math.min(state.width, LIVE_WIDTH_CAP);
    }

    function currentOpts() {
      return {
        width: effectiveWidth(),
        color: state.color,
        ramp: state.ramp,
        invert: state.invert,
        edges: state.edges,
      };
    }

    // Returns the edge character at (x, y), or ' ' if gradient is below threshold.
    function edgeChar(lum, x, y, w, h) {
      if (x === 0 || x === w - 1 || y === 0 || y === h - 1) return ' ';
      const tl = lum[(y - 1) * w + (x - 1)];
      const t  = lum[(y - 1) * w + x];
      const tr = lum[(y - 1) * w + (x + 1)];
      const l  = lum[y * w + (x - 1)];
      const r  = lum[y * w + (x + 1)];
      const bl = lum[(y + 1) * w + (x - 1)];
      const b  = lum[(y + 1) * w + x];
      const br = lum[(y + 1) * w + (x + 1)];
      const gx = -tl + tr - 2 * l + 2 * r - bl + br;
      const gy = -tl - 2 * t - tr + bl + 2 * b + br;
      const mag = Math.sqrt(gx * gx + gy * gy);
      if (mag < EDGE_THRESHOLD) return ' ';
      const deg = (Math.atan2(gy, gx) * 180 / Math.PI + 180) % 180;
      if (deg < 22.5 || deg >= 157.5) return '-';
      if (deg < 67.5)  return '/';
      if (deg < 112.5) return '|';
      return '\\';
    }

    function sampleSource(src, width, height) {
      const canvas = els.canvas;
      canvas.width = width;
      canvas.height = height;
      const ctx = canvas.getContext('2d');
      ctx.drawImage(src, 0, 0, width, height);
      return ctx.getImageData(0, 0, width, height).data;
    }

    function computeLuminance(data, width, height) {
      const lum = new Float32Array(width * height);
      for (let i = 0, j = 0; j < lum.length; i += 4, j++) {
        lum[j] = 0.299 * data[i] + 0.587 * data[i + 1] + 0.114 * data[i + 2];
      }
      return lum;
    }

    function cellFor(data, lum, x, y, w, h, opts, rampStr, rampLast) {
      const i = (y * w + x) * 4;
      const r = data[i], g = data[i + 1], b = data[i + 2];
      // Base character from luminance + current ramp
      const L = 0.299 * r + 0.587 * g + 0.114 * b;
      let idx = Math.round((L / 255) * rampLast);
      if (opts.invert) idx = rampLast - idx;
      let ch = rampStr[idx];
      // Edge overlay: replace the ramp char where the gradient is strong enough
      if (opts.edges) {
        const ech = edgeChar(lum, x, y, w, h);
        if (ech !== ' ') ch = ech;
      }
      return { ch, r, g, b };
    }

    function imageToAsciiHtml(src, dims, opts) {
      const width = opts.width;
      const aspect = dims.h / dims.w;
      const height = Math.max(1, Math.round(aspect * width * 0.5));

      const data = sampleSource(src, width, height);
      const lum = opts.edges ? computeLuminance(data, width, height) : null;
      const rampStr = RAMPS[opts.ramp];
      const rampLast = rampStr.length - 1;

      let out = '';
      for (let y = 0; y < height; y++) {
        for (let x = 0; x < width; x++) {
          const { ch, r, g, b } = cellFor(
            data, lum, x, y, width, height, opts, rampStr, rampLast);
          const esc = escapeHtmlChar(ch);
          if (opts.color) {
            out += '<span style="color:rgb(' + r + ',' + g + ',' + b + ')">' + esc + '</span>';
          } else {
            out += esc;
          }
        }
        out += '\n';
      }
      return out;
    }

    function imageToAsciiCanvas(src, dims, opts, scale = 2) {
      const width = opts.width;
      const aspect = dims.h / dims.w;
      const height = Math.max(1, Math.round(aspect * width * 0.5));

      const data = sampleSource(src, width, height);
      const lum = opts.edges ? computeLuminance(data, width, height) : null;
      const rampStr = RAMPS[opts.ramp];
      const rampLast = rampStr.length - 1;

      const charW = 8 * scale;
      const charH = 16 * scale;
      const fontSize = 14 * scale;

      const out = document.createElement('canvas');
      out.width = width * charW;
      out.height = height * charH;
      const ctx = out.getContext('2d');
      ctx.fillStyle = '#0a0e0a';
      ctx.fillRect(0, 0, out.width, out.height);
      ctx.font = fontSize + 'px "JetBrains Mono", "Courier New", monospace';
      ctx.textBaseline = 'top';
      ctx.textAlign = 'left';

      for (let y = 0; y < height; y++) {
        for (let x = 0; x < width; x++) {
          const { ch, r, g, b } = cellFor(
            data, lum, x, y, width, height, opts, rampStr, rampLast);
          if (ch === ' ') continue;
          ctx.fillStyle = opts.color ? `rgb(${r},${g},${b})` : '#c0e0c0';
          ctx.fillText(ch, x * charW, y * charH);
        }
      }
      return out;
    }

    function render() {
      if (!state.source) {
        els.output.innerHTML = '';
        els.empty.style.display = '';
        state.lastRenderMs = null;
        els.copy.disabled = true;
        updateStatus();
        return;
      }
      const dims = sourceDims(state.source);
      if (!dims) return;
      els.empty.style.display = 'none';

      const t0 = performance.now();
      els.output.innerHTML = imageToAsciiHtml(state.source, dims, currentOpts());
      state.lastRenderMs = Math.round(performance.now() - t0);

      els.copy.disabled = false;
      updateStatus();
    }

    // ==== Live loop ====

    let rafId = null;
    let lastRenderTime = 0;

    function startLiveLoop() {
      stopLiveLoop();
      lastRenderTime = 0;
      const tick = (now) => {
        if (now - lastRenderTime >= FRAME_INTERVAL_MS) {
          render();
          lastRenderTime = now;
        }
        rafId = requestAnimationFrame(tick);
      };
      rafId = requestAnimationFrame(tick);
    }

    function stopLiveLoop() {
      if (rafId != null) {
        cancelAnimationFrame(rafId);
        rafId = null;
      }
    }

    // ==== Status line (derived info only) ====

    function updateStatus() {
      if (!state.source) {
        els.status.hidden = true;
        return;
      }
      const dims = sourceDims(state.source);
      if (!dims) {
        els.status.hidden = true;
        return;
      }
      const parts = [];

      parts.push(kv('source', dims.w + '×' + dims.h));

      const eff = effectiveWidth();
      if (eff < state.width) {
        parts.push(kv('cols', eff,
          ` <span class="status-note">(capped from ${state.width})</span>`));
      } else {
        parts.push(kv('cols', eff));
      }

      if (state.lastRenderMs != null) parts.push(kv('render', state.lastRenderMs + 'ms'));

      els.status.innerHTML = parts.join('');
      els.status.hidden = false;
    }

    function kv(k, v, note = '') {
      return `<span class="status-key">${k}=</span><span class="status-val">${v}${note}</span>`;
    }

    // ==== URL hash sync ====

    function stateToHash() {
      const p = new URLSearchParams();
      p.set('width', state.width);
      p.set('color', state.color ? 1 : 0);
      p.set('ramp', state.ramp);
      p.set('invert', state.invert ? 1 : 0);
      p.set('edges', state.edges ? 1 : 0);
      return '#' + p.toString();
    }

    function loadStateFromHash() {
      const p = new URLSearchParams(window.location.hash.slice(1));
      const w = parseInt(p.get('width'), 10);
      if (Number.isFinite(w) && w >= 40 && w <= 300) state.width = w;
      if (p.has('color')) state.color = p.get('color') !== '0';
      const ramp = p.get('ramp');
      if (ramp && RAMP_KEYS.includes(ramp)) state.ramp = ramp;
      if (p.has('invert')) state.invert = p.get('invert') === '1';
      if (p.has('edges')) state.edges = p.get('edges') === '1';
    }

    function syncHash() {
      history.replaceState(null, '', stateToHash());
    }

    // ==== Control updates ====

    function applyStateToControls() {
      els.width.value = state.width;
      els.widthVal.textContent = state.width;
      paintSliderFill(els.width);

      setToggle(els.colorToggle, state.color);
      setRampTrigger(state.ramp);
      setToggle(els.invertToggle, state.invert);
      setToggle(els.edgesToggle, state.edges);
    }

    function setToggle(el, on) {
      el.dataset.state = on ? 'on' : 'off';
      el.textContent = on ? 'on' : 'off';
      el.setAttribute('aria-pressed', on ? 'true' : 'false');
    }

    function setRampTrigger(ramp) {
      els.rampTrigger.textContent = ramp;
      for (const li of els.rampMenu.querySelectorAll('li')) {
        li.classList.toggle('selected', li.dataset.value === ramp);
      }
    }

    function paintSliderFill(slider) {
      const min = parseFloat(slider.min);
      const max = parseFloat(slider.max);
      const v = parseFloat(slider.value);
      const pct = ((v - min) / (max - min)) * 100;
      slider.style.background =
        `linear-gradient(to right, var(--accent) 0%, var(--accent) ${pct}%, var(--border) ${pct}%, var(--border) 100%)`;
    }

    function onSettingChange() {
      syncHash();
      updateStatus();
      if (state.mode === 'image') render();
    }

    // ==== Mode controllers ====

    function renderEmptyForMode() {
      if (state.mode === 'image') {
        els.empty.innerHTML = `
          <div class="empty-line empty-action" data-empty-action="image">drop an image anywhere</div>
          <div class="empty-or">— or —</div>
          <div class="empty-line">click <span class="kbd" data-empty-mode="webcam">[ webcam ]</span> above</div>
          <span class="cursor">_</span>
        `;
      } else if (state.mode === 'video') {
        els.empty.innerHTML = `
          <div class="empty-line empty-action" data-empty-action="video">drop a video file anywhere</div>
          <div class="empty-or">— or —</div>
          <div class="empty-line">click <span class="kbd" data-empty-mode="image">[ image ]</span> for a still</div>
          <span class="cursor">_</span>
        `;
      } else {
        els.empty.innerHTML = `<span class="cursor">_</span>`;
      }
    }

    function setEmptyStatus(text, isError = false) {
      const cls = isError ? 'empty-line empty-error' : 'empty-line';
      els.empty.innerHTML = `<div class="${cls}">${text}</div><span class="cursor">_</span>`;
    }

    function updateModeUI() {
      for (const btn of els.modeGroup.querySelectorAll('.mode-btn')) {
        btn.classList.toggle('active', btn.dataset.mode === state.mode);
      }
      els.liveIndicator.classList.toggle('show', state.mode === 'webcam');
      els.videoControls.classList.toggle('show',
        state.mode === 'video' && !!state.source);
    }

    function cleanup() {
      stopLiveLoop();
      if (webcamStream) {
        webcamStream.getTracks().forEach((t) => t.stop());
        webcamStream = null;
      }
      els.videoSource.pause();
      els.videoSource.srcObject = null;
      if (videoObjectUrl) {
        URL.revokeObjectURL(videoObjectUrl);
        videoObjectUrl = null;
      }
      els.videoSource.removeAttribute('src');
      els.videoSource.load();
      state.source = null;
    }

    function setMode(newMode) {
      if (newMode === state.mode && newMode !== 'video') return;
      cleanup();
      state.mode = newMode;

      if (newMode === 'image') {
        state.source = lastImage;
        renderEmptyForMode();
        updateModeUI();
        render();
      } else if (newMode === 'webcam') {
        renderEmptyForMode();
        updateModeUI();
        startWebcam();
      } else if (newMode === 'video') {
        renderEmptyForMode();
        updateModeUI();
        render();
        els.videoFileInput.click();
      }
    }

    // ==== Mode: image ====

    function loadImageFile(file) {
      const reader = new FileReader();
      reader.onload = () => {
        const img = new Image();
        img.onload = () => {
          if (state.mode !== 'image') {
            cleanup();
            state.mode = 'image';
            renderEmptyForMode();
            updateModeUI();
          }
          lastImage = img;
          state.source = img;
          render();
        };
        img.onerror = () => showError('Failed to decode image.');
        img.src = reader.result;
      };
      reader.onerror = () => showError('Failed to read file.');
      reader.readAsDataURL(file);
    }

    // ==== Mode: webcam ====

    async function startWebcam() {
      setEmptyStatus('requesting camera access…');
      try {
        const stream = await navigator.mediaDevices.getUserMedia({
          video: true, audio: false,
        });
        if (state.mode !== 'webcam') {
          stream.getTracks().forEach((t) => t.stop());
          return;
        }
        webcamStream = stream;
        els.videoSource.srcObject = stream;
        await els.videoSource.play();
        state.source = els.videoSource;
        els.videoSource.addEventListener('loadedmetadata',
          () => render(), { once: true });
        startLiveLoop();
      } catch (err) {
        setEmptyStatus('camera access denied — check your browser settings', true);
        showError('Camera access denied.');
        setTimeout(() => {
          if (state.mode === 'webcam') setMode('image');
        }, 2500);
      }
    }

    // ==== Mode: video ====

    function loadVideoFile(file) {
      if (!file.type.startsWith('video/')) {
        showError('Not a video file.');
        return;
      }
      if (state.mode !== 'video') {
        cleanup();
        state.mode = 'video';
        renderEmptyForMode();
        updateModeUI();
      }
      if (videoObjectUrl) URL.revokeObjectURL(videoObjectUrl);
      videoObjectUrl = URL.createObjectURL(file);
      els.videoSource.srcObject = null;
      els.videoSource.src = videoObjectUrl;
      els.videoSource.loop = true;
      els.videoSource.muted = true;
      els.videoSource.play().then(() => {
        state.source = els.videoSource;
        updateModeUI();
        startLiveLoop();
      }).catch((err) => showError('Could not play video: ' + err.message));
    }

    function formatTime(s) {
      if (!isFinite(s) || s < 0) s = 0;
      const m = Math.floor(s / 60);
      const sec = Math.floor(s % 60).toString().padStart(2, '0');
      return m + ':' + sec;
    }

    els.videoSource.addEventListener('timeupdate', () => {
      if (state.mode !== 'video') return;
      els.time.textContent =
        formatTime(els.videoSource.currentTime) + ' / ' +
        formatTime(els.videoSource.duration);
    });
    els.videoSource.addEventListener('play', () => {
      if (state.mode === 'video') els.playpause.textContent = '❚❚';
    });
    els.videoSource.addEventListener('pause', () => {
      if (state.mode === 'video') els.playpause.textContent = '▶';
    });
    els.playpause.addEventListener('click', () => {
      if (els.videoSource.paused) els.videoSource.play();
      else els.videoSource.pause();
    });

    // ==== File router ====

    function handleDroppedFile(file) {
      if (!file) return;
      if (file.type.startsWith('image/')) loadImageFile(file);
      else if (file.type.startsWith('video/')) loadVideoFile(file);
      else showError('Not an image or video file.');
    }

    // ==== Save / share ====

    function saveAsPng() {
      if (!state.source) {
        showError('Load an image first.');
        return;
      }
      const dims = sourceDims(state.source);
      if (!dims) {
        showError('Source not ready.');
        return;
      }
      const canvas = imageToAsciiCanvas(state.source, dims, currentOpts(), 2);
      canvas.toBlob((blob) => {
        if (!blob) {
          showError('Could not export PNG.');
          return;
        }
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = 'ascii-' + Date.now() + '.png';
        document.body.appendChild(a);
        a.click();
        a.remove();
        setTimeout(() => URL.revokeObjectURL(url), 1000);
      }, 'image/png');
    }

    let copyResetTimer = null;
    async function copyAscii() {
      if (!state.source) return;
      const text = els.output.textContent;
      try {
        await navigator.clipboard.writeText(text);
        els.copy.textContent = '[ copied ]';
        els.copy.classList.add('copied');
        els.copy.classList.remove('failed');
      } catch (err) {
        els.copy.textContent = '[ failed ]';
        els.copy.classList.add('failed');
        els.copy.classList.remove('copied');
      }
      clearTimeout(copyResetTimer);
      copyResetTimer = setTimeout(() => {
        els.copy.textContent = '[ copy ]';
        els.copy.classList.remove('copied', 'failed');
      }, 1500);
    }

    let shareResetTimer = null;
    async function copyShareUrl() {
      try {
        await navigator.clipboard.writeText(window.location.href);
        els.share.textContent = '[ copied ]';
        els.share.classList.add('copied');
        clearTimeout(shareResetTimer);
        shareResetTimer = setTimeout(() => {
          els.share.textContent = '[ share ]';
          els.share.classList.remove('copied');
        }, 1500);
      } catch (err) {
        showError('Clipboard unavailable (needs HTTPS/localhost).');
      }
    }

    // ==== Errors ====

    let errorTimer = null;
    function showError(msg) {
      els.error.textContent = msg;
      els.error.classList.add('show');
      clearTimeout(errorTimer);
      errorTimer = setTimeout(() => els.error.classList.remove('show'), 2500);
    }

    // ==== Wiring ====

    // Width slider
    els.width.addEventListener('input', () => {
      state.width = parseInt(els.width.value, 10);
      els.widthVal.textContent = state.width;
      paintSliderFill(els.width);
      onSettingChange();
    });

    // Color toggle
    els.colorToggle.addEventListener('click', () => {
      state.color = !state.color;
      setToggle(els.colorToggle, state.color);
      onSettingChange();
    });

    // Invert toggle
    els.invertToggle.addEventListener('click', () => {
      state.invert = !state.invert;
      setToggle(els.invertToggle, state.invert);
      onSettingChange();
    });

    // Edges toggle
    els.edgesToggle.addEventListener('click', () => {
      state.edges = !state.edges;
      setToggle(els.edgesToggle, state.edges);
      onSettingChange();
    });

    // Ramp dropdown
    els.rampTrigger.addEventListener('click', (e) => {
      e.stopPropagation();
      const showing = els.rampMenu.hidden === false;
      els.rampMenu.hidden = showing;
      els.rampTrigger.setAttribute('aria-expanded', String(!showing));
    });
    els.rampMenu.addEventListener('click', (e) => {
      const li = e.target.closest('li');
      if (!li) return;
      state.ramp = li.dataset.value;
      setRampTrigger(state.ramp);
      els.rampMenu.hidden = true;
      els.rampTrigger.setAttribute('aria-expanded', 'false');
      onSettingChange();
    });
    document.addEventListener('click', () => {
      if (!els.rampMenu.hidden) {
        els.rampMenu.hidden = true;
        els.rampTrigger.setAttribute('aria-expanded', 'false');
      }
    });

    // Mode buttons
    els.modeGroup.addEventListener('click', (e) => {
      const btn = e.target.closest('.mode-btn');
      if (!btn) return;
      setMode(btn.dataset.mode);
    });

    // Action buttons
    els.copy.addEventListener('click', copyAscii);
    els.save.addEventListener('click', saveAsPng);
    els.share.addEventListener('click', copyShareUrl);

    // Empty-state interactions (click to open file picker, kbd hints to switch mode)
    els.empty.addEventListener('click', (e) => {
      const action = e.target.closest('[data-empty-action]');
      if (action) {
        if (action.dataset.emptyAction === 'video') els.videoFileInput.click();
        else els.fileInput.click();
        return;
      }
      const modeHint = e.target.closest('[data-empty-mode]');
      if (modeHint) setMode(modeHint.dataset.emptyMode);
    });

    // File inputs
    els.fileInput.addEventListener('change', (e) => {
      const f = e.target.files[0];
      if (f) loadImageFile(f);
      els.fileInput.value = '';
    });
    els.videoFileInput.addEventListener('change', (e) => {
      const f = e.target.files[0];
      if (f) loadVideoFile(f);
      els.videoFileInput.value = '';
    });

    // Drag and drop
    let dragDepth = 0;
    window.addEventListener('dragenter', (e) => {
      e.preventDefault();
      dragDepth++;
      document.body.classList.add('dragging');
    });
    window.addEventListener('dragover', (e) => { e.preventDefault(); });
    window.addEventListener('dragleave', (e) => {
      e.preventDefault();
      dragDepth = Math.max(0, dragDepth - 1);
      if (dragDepth === 0) document.body.classList.remove('dragging');
    });
    window.addEventListener('drop', (e) => {
      e.preventDefault();
      dragDepth = 0;
      document.body.classList.remove('dragging');
      const f = e.dataTransfer && e.dataTransfer.files && e.dataTransfer.files[0];
      handleDroppedFile(f);
    });

    // ==== Boot ====

    loadStateFromHash();
    applyStateToControls();
    renderEmptyForMode();
    updateModeUI();
    syncHash();
    render();
  </script>
</body>
</html>
